name: 'Hello World Action'
description: 'Greets the user and logs a message'
inputs:
  who-to-greet:
    description: 'Who to greet'
    required: true
    default: 'Engineer'
runs:
  using: 'composite'
  steps:
    - run: echo "Hello ${{ inputs.who-to-greet }}"
      shell: bash
    - run: echo "Action executed successfully!"
      shell: bash
