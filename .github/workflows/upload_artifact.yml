name: Upload build Artifact Workflow
on:
  workflow_dispatch:
  
jobs:
   upload-artifact:
      runs-on: ubuntu-latest    
      steps:
        - run: mkdir -p /test/
        - run: echo hello world > test/world.txt
        - uses: actions/upload-artifact@v4
      with:
          name: my-artifact
          path: /test/world.txt
