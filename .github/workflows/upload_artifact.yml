name: Upload build Artifact Workflow
on:
  workflow_dispatch:

jobs:
  manual-job-upload:
    runs-on: ubuntu-latest 
    steps:
      - name: Create Directory and File
        run: |
          mkdir -p test/
          echo "hello world" > test/world.txt
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-artifact
          path: test/world.txt
